services:
  postgres:
    image: postgres:16
    container_name: rust_server_postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: rust_server_api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.dev
    ports:
      - "7878:7878"

volumes:
  postgres_data: